name: Restore source files

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/restore-source.yml
      - restore-source.js
      - source-parts/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node restore-source.js
      - name: Copy restored files
        run: |
          cp restored-source/Code.gs Code.gs
          cp restored-source/index.html index.html
          cp restored-source/lite.html lite.html
      - name: Commit restored files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Code.gs index.html lite.html
          if git diff --cached --quiet; then
            echo "No source changes to commit"
          else
            git commit -m "Restore source files"
            git push
          fi
